name: CI

# Runs the quality gate on every PR to main. Triggering on pull_request alone
# (rather than also on push) means each push to a PR branch runs CI exactly
# once via the PR's synchronize event — no duplicate runs. Pushes to main are
# covered by the Deploy workflow, which runs the same checks before publishing.
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, unit tests & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Cache SvelteKit artifacts
        uses: actions/cache@v6
        with:
          path: |
            .svelte-kit
            node_modules/.cache
          key: ${{ runner.os }}-sveltekit-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-sveltekit-

      # Responsive image variants are regenerated by prebuild; cache them so a
      # build only re-encodes images that actually changed (~1min saved).
      - name: Cache image variants
        uses: actions/cache@v6
        with:
          path: static/images/_r
          key: ${{ runner.os }}-img-variants-${{ hashFiles('static/images/**', '!static/images/_r/**', 'scripts/generate-image-variants.mjs') }}
          restore-keys: |
            ${{ runner.os }}-img-variants-

      - name: Install dependencies
        run: npm ci

      # Tripwire for the hand-maintained `overrides` list in package.json:
      # fail the PR gate on known high/critical advisories. (Deliberately not
      # in the deploy workflow so a freshly published CVE can't block an
      # urgent content deploy.)
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint (Prettier + ESLint)
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Reference index freshness
        run: node scripts/generate-reference-index.mjs --check

      - name: Build
        run: npm run build

      - name: Upload build for E2E job
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build/
          retention-days: 1

  e2e:
    name: E2E smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Cache SvelteKit artifacts
        uses: actions/cache@v6
        with:
          path: |
            .svelte-kit
            node_modules/.cache
          key: ${{ runner.os }}-sveltekit-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-sveltekit-

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build
          path: build

      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_SKIP_BUILD: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
