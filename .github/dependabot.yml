version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    reviewers:
      - 'fmadore'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      # SvelteKit/Vite framework core
      framework:
        patterns:
          - '@sveltejs/*'
          - 'svelte'
          - 'svelte-check'
          - 'vite'
          - 'mdsvex'
        update-types:
          - 'minor'
          - 'patch'
      # Linting, formatting, types, testing
      dev-tooling:
        patterns:
          - '@types/*'
          - '@eslint/*'
          - 'eslint*'
          - 'prettier*'
          - 'typescript*'
          - '@playwright/*'
          - 'globals'
        update-types:
          - 'minor'
          - 'patch'
      # PostCSS ecosystem
      postcss:
        patterns:
          - '@csstools/*'
          - 'postcss*'
        update-types:
          - 'minor'
          - 'patch'
      # Iconify icon libraries
      iconify:
        patterns:
          - '@iconify/*'
          - '@iconify-icons/*'
        update-types:
          - 'minor'
          - 'patch'
      # Data visualization libraries
      visualization:
        patterns:
          - 'd3'
          - '@types/d3'
          - 'echarts*'
          - 'maplibre-gl'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    reviewers:
      - 'fmadore'
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci)'
    groups:
      # Group all GitHub Actions updates together
      actions-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
