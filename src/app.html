<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/icons/favicon.png" />

		<!-- PWA Configuration -->
		<link rel="apple-touch-icon" href="/icons/favicon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#1c1914" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="F. Madore" />
		<meta name="application-name" content="F. Madore" />
		<meta name="msapplication-TileColor" content="#1c1914" />
		<meta name="msapplication-config" content="/browserconfig.xml" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Security: Content Security Policy -->
		<!-- Note: frame-ancestors must be set via HTTP headers (not supported in meta tags) -->
		<!-- Configure frame-ancestors in your hosting provider's headers (e.g., Netlify _headers file) -->
		<!-- GA4 CSP requirements: https://developers.google.com/tag-platform/security/guides/csp -->
		<meta
			http-equiv="Content-Security-Policy"
			content="
		default-src 'self';
		script-src 'self' 'unsafe-inline' https://*.googletagmanager.com https://*.google-analytics.com;
		style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
		font-src 'self' https://fonts.gstatic.com;
		img-src 'self' data: https: blob:;
		connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://api.iconify.design https://api.maptiler.com https://zenodo.org https://*.cartocdn.com;
		frame-src https://fmadore.github.io https://am-digital-research-environment.github.io https://cdn.knightlab.com;
		worker-src 'self' blob:;
		base-uri 'self';
		form-action 'self';
	"
		/>

		<!-- Critical CSS: Inlined to prevent render-blocking and reduce LCP -->
		<!-- Values align with design system: variables.css tokens (warm neutrals + terracotta) -->
		<!-- Light: warm paper #faf7f2 bg, warm ink #2a211a text | Dark: warm dusk #1c1914 bg, warm paper #f0ebe3 text -->
		<!-- --border-radius-lg: 0.75rem, --glass-blur-sm: 8px (using sm for perf) -->
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			html {
				color-scheme: light dark;
			}
			body {
				margin: 0;
				min-height: 100vh;
				font-family:
					'Commissioner',
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					'Helvetica Neue',
					Arial,
					sans-serif;
				line-height: 1.5;
				background-color: #faf7f2;
				color: #2a211a;
			}
			html.dark body {
				background-color: #1c1914;
				color: #f0ebe3;
			}
			.container {
				width: 100%;
				max-width: 80rem;
				margin: 0 auto;
				padding: 0 1rem;
			}
			img {
				max-width: 100%;
				height: auto;
				display: block;
			}
			.grid {
				display: grid;
			}
			.grid-cols-1 {
				grid-template-columns: 1fr;
			}
			/* app.html is pre-PostCSS; raw px breakpoint is intentional and mirrors --md (768px) from variables.css */
			@media (min-width: 768px) {
				.md\:grid-cols-3 {
					grid-template-columns: repeat(3, 1fr);
				}
				.md\:gap-8 {
					gap: 2rem;
				}
				.md\:col-span-2 {
					grid-column: span 2;
				}
			}
			.flex {
				display: flex;
			}
			.items-center {
				align-items: center;
			}
			.justify-between {
				justify-content: space-between;
			}
			.py-8 {
				padding-top: 2rem;
				padding-bottom: 2rem;
			}
			.mt-8 {
				margin-top: 2rem;
			}
			.gap-6 {
				gap: 1.5rem;
			}
			header {
				min-height: 64px;
			}
			/* Paper surfaces (formerly glassmorphism) — elevated paper tiles,
			 * no backdrop-filter. Full styling in utilities/glassmorphism.css;
			 * this inline block is for FOUC only. */
			.glass-card,
			.glass-panel {
				background: #ffffff;
				border: 1px solid #e9e2d5;
				border-radius: 0.75rem;
				box-shadow: 0 1px 2px 0 rgba(42, 33, 26, 0.05);
			}
			html.dark .glass-card,
			html.dark .glass-panel {
				background: #3e342a;
				border-color: #584b40;
				box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.2);
			}
			.max-w-7xl {
				max-width: 80rem;
			}
		</style>

		<!-- Performance hints: only preconnect to origins used on initial load -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- DNS prefetch as fallback for browsers without preconnect support -->
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />

		<!-- Google Fonts: loaded async to avoid render-blocking -->
		<!-- Commissioner (humanist variable sans, UI/body) + Spectral (editorial serif, headings/long-form) + JetBrains Mono (code/data-viz chrome only) -->
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300..700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap"
			onload="
				this.onload = null;
				this.rel = 'stylesheet';
			"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300..700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<!-- Profile picture will be preloaded only on home page where it's needed -->

		<!-- Theme initialization script -->
		<script>
			(function () {
				const theme = localStorage.getItem('theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const defaultTheme = 'light'; // Default theme if nothing else is set

				let initialTheme = defaultTheme;
				if (theme && ['light', 'dark'].includes(theme)) {
					initialTheme = theme;
				} else if (!theme && prefersDark) {
					initialTheme = 'dark';
				}

				document.documentElement.classList.add(initialTheme);
			})();
		</script>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="tap">
		<div class="sveltekit-body-container">%sveltekit.body%</div>
	</body>
</html>
